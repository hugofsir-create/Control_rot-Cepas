
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#09090b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="metadata.json">
    <title>LogiPro - Gestión de Almacén</title>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; overflow: visible !important; height: auto !important; }
            #root { height: auto !important; }
        }
        * { -webkit-tap-highlight-color: transparent; outline-color: #f59e0b; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        
        body {
          overscroll-behavior-y: contain;
          background-color: #09090b;
        }

        #root:empty::before {
            content: 'INICIALIZANDO LOGIPRO...';
            display: block;
            text-align: center;
            margin-top: 45vh;
            font-family: ui-sans-serif, system-ui;
            font-weight: 900;
            color: #3f3f46;
            letter-spacing: 0.3em;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
    <link rel="stylesheet" href="/index.css">
</head>
<body class="text-zinc-100 antialiased h-screen overflow-hidden select-none">
    <div id="root" class="h-full"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      // Registro de Service Worker optimizado para evitar errores de origen
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Usamos una ruta relativa estricta para asegurar que el origen sea el correcto
          const swPath = './sw.js';
          
          navigator.serviceWorker.register(swPath)
            .then(reg => {
              console.log('LogiPro SW registrado con éxito en el ámbito:', reg.scope);
            })
            .catch(err => {
              // En entornos de previsualización (iframe/sandbox), es normal que falle.
              // El sistema seguirá funcionando, solo que no será instalable offline.
              console.warn('Registro de PWA omitido (Entorno restringido o Sandbox)');
            });
        });
      }
    </script>
</body>
</html>
